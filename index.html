<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>兼职任务查询看板</title>
<style>
:root{--bg1:#f6f7ff;--bg2:#eef9ff;--card:rgba(255,255,255,.86);--text:#172033;--muted:#6b7280;--line:rgba(30,41,59,.1);--brand:#6c5ce7;--green:#00b894;--blue:#0984e3;--orange:#f59e0b;--red:#ef4444;--shadow:0 20px 60px rgba(31,41,55,.12);--soft:0 10px 24px rgba(31,41,55,.08);--r:24px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 8%,rgba(108,92,231,.2),transparent 28%),radial-gradient(circle at 88% 10%,rgba(0,184,148,.18),transparent 30%),linear-gradient(135deg,var(--bg1),var(--bg2))}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.35) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.4),transparent 70%)}
.app{width:min(1480px,calc(100% - 32px));margin:auto;padding:26px 0 60px}
.hero{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.75);border-radius:30px;padding:28px;box-shadow:var(--shadow);background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,.66)),linear-gradient(135deg,rgba(108,92,231,.16),rgba(0,184,148,.12));backdrop-filter:blur(18px)}
.hero:after{content:"✓";position:absolute;right:28px;top:18px;width:86px;height:86px;border-radius:28px;display:grid;place-items:center;font-size:46px;color:rgba(108,92,231,.18);background:rgba(255,255,255,.55);transform:rotate(8deg)}
.title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;position:relative;z-index:1}.eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--brand);font-weight:900;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.dot{width:9px;height:9px;border-radius:99px;background:var(--green);box-shadow:0 0 0 6px rgba(0,184,148,.12)}
h1{margin:0;font-size:clamp(26px,3.4vw,46px);letter-spacing:-.04em;line-height:1.08}.sub{margin:12px 0 0;color:var(--muted);font-size:15px;line-height:1.7;max-width:760px}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;min-width:240px}
.btn{border:0;border-radius:999px;padding:11px 16px;font-size:14px;font-weight:900;cursor:pointer;transition:.18s;color:var(--text);background:rgba(255,255,255,.76);box-shadow:0 8px 18px rgba(31,41,55,.08);white-space:nowrap}.btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(31,41,55,.12)}.btn.success{color:#fff;background:linear-gradient(135deg,var(--green),#27d8aa)}.btn.ghost{color:var(--brand);background:rgba(108,92,231,.1);box-shadow:none}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:20px;position:relative;z-index:1}.stat{padding:17px;border-radius:22px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.88);box-shadow:var(--soft)}.stat-label{color:var(--muted);font-size:13px;font-weight:800}.stat-num{margin-top:8px;font-size:28px;font-weight:950;letter-spacing:-.03em}
.filters-wrap{position:sticky;top:10px;z-index:20;margin-top:18px}.filters{border-radius:28px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.9);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:16px}.filter-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr;gap:12px;align-items:end}.field{display:flex;flex-direction:column;gap:7px;min-width:0}label{font-size:12px;color:var(--muted);font-weight:900;padding-left:4px}input,select{width:100%;border:1px solid rgba(30,41,59,.12);border-radius:16px;padding:12px 13px;outline:none;background:rgba(255,255,255,.94);color:var(--text);font-size:14px;transition:.18s}input:focus,select:focus{border-color:rgba(108,92,231,.56);box-shadow:0 0 0 5px rgba(108,92,231,.12)}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center;justify-content:space-between}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:0;background:rgba(108,92,231,.09);color:#5144bb;border-radius:999px;padding:8px 11px;font-weight:900;cursor:pointer;transition:.18s}.chip:hover,.chip.active{color:#fff;background:var(--brand);transform:translateY(-1px)}.result-text{color:var(--muted);font-size:13px;font-weight:900}
.table-card{margin-top:18px;border-radius:28px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(18px)}.table-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.table-title{font-weight:950;font-size:17px}.hint{color:var(--muted);font-size:13px}.table-scroll{overflow:auto;max-height:calc(100vh - 250px)}table{width:100%;border-collapse:separate;border-spacing:0;min-width:1180px;font-size:14px}thead th{position:sticky;top:0;z-index:5;background:rgba(248,250,252,.98);color:#4b5563;text-align:left;padding:13px 12px;border-bottom:1px solid var(--line);font-size:12px;letter-spacing:.03em;white-space:nowrap}tbody td{padding:14px 12px;border-bottom:1px solid rgba(30,41,59,.07);vertical-align:top}tbody tr{transition:.18s}tbody tr:hover{background:rgba(108,92,231,.06)}.task-id{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:950;color:var(--brand)}.task-name{max-width:300px;font-weight:850;line-height:1.45}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-weight:950;font-size:12px;white-space:nowrap}.pill:before{content:"";width:7px;height:7px;border-radius:99px;background:currentColor}.ok{color:#047857;background:rgba(16,185,129,.12)}.doing{color:#0369a1;background:rgba(14,165,233,.13)}.wait{color:#92400e;background:rgba(245,158,11,.15)}.bad{color:#b91c1c;background:rgba(239,68,68,.13)}.neutral{color:#475569;background:rgba(100,116,139,.12)}.money{font-weight:950;color:#047857}.note{max-width:280px;color:#4b5563;line-height:1.45}.empty{padding:50px 20px;text-align:center;color:var(--muted)}.empty-icon{font-size:42px;margin-bottom:10px}
.backtop{position:fixed;right:22px;bottom:24px;z-index:40;width:52px;height:52px;border:0;border-radius:18px;color:#fff;background:linear-gradient(135deg,var(--brand),#8e7dff);box-shadow:0 16px 38px rgba(108,92,231,.38);cursor:pointer;font-size:22px;opacity:0;transform:translateY(14px);pointer-events:none;transition:.2s}.backtop.show{opacity:1;transform:translateY(0);pointer-events:auto}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;z-index:60;background:rgba(17,24,39,.92);color:#fff;border-radius:999px;padding:11px 16px;font-weight:900;box-shadow:var(--shadow);transition:.22s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:1100px){.filter-grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.hero:after{display:none}}@media(max-width:720px){.app{width:min(100% - 18px,1480px);padding-top:10px}.hero{padding:20px;border-radius:24px}.title-row{display:block}.actions{justify-content:flex-start;margin-top:16px}.stats{grid-template-columns:1fr}.filters-wrap{top:6px}.filters{padding:12px;border-radius:22px}.filter-grid,.date-row{grid-template-columns:1fr}.table-scroll{max-height:none}.table-top{align-items:flex-start;flex-direction:column}.backtop{right:14px;bottom:16px}}
</style>
</head>
<body>
<main class="app">
<section class="hero" id="top">
<div class="title-row">
<div><div class="eyebrow"><span class="dot"></span>Task Board</div><h1>兼职任务查询看板</h1><p class="sub">按兼职、任务ID、任务状态和质检审核完成日期快速筛选任务，提成结算以“质检审核完成日期”为准。</p></div>
<div class="actions"><button class="btn ghost" id="copySummaryBtn" type="button">复制筛选摘要</button><button class="btn success" id="exportBtn" type="button">导出当前结果</button></div>
</div>
<div class="stats"><div class="stat"><div class="stat-label">📦 总任务数</div><div class="stat-num" id="totalCount">0</div></div><div class="stat"><div class="stat-label">✅ 已完成</div><div class="stat-num" id="doneCount">0</div></div><div class="stat"><div class="stat-label">⏳ 待处理</div><div class="stat-num" id="pendingCount">0</div></div><div class="stat"><div class="stat-label">🔎 当前筛选</div><div class="stat-num" id="filteredCount">0</div></div></div>
</section>

<section class="filters-wrap"><div class="filters">
<div class="filter-grid">
<div class="field"><label for="keywordInput">关键词</label><input id="keywordInput" type="search" placeholder="搜索任务名、备注、学科、年级..."></div>
<div class="field"><label for="taskIdInput">任务ID</label><input id="taskIdInput" type="search" placeholder="输入任务ID"></div>
<div class="field"><label for="partTimerSelect">兼职</label><select id="partTimerSelect"><option value="">全部兼职</option></select></div>
<div class="field"><label for="statusSelect">任务状态</label><select id="statusSelect"><option value="">全部状态</option></select></div>
<div class="field"><label>质检审核完成日期</label><div class="date-row"><input id="startDateInput" type="date"><input id="endDateInput" type="date"></div></div>
</div>
<div class="quick-row">
<div class="chips" id="quickChips"><button class="chip active" data-range="all" type="button">全部</button><button class="chip" data-range="today" type="button">今天</button><button class="chip" data-range="7days" type="button">最近7天</button><button class="chip" data-range="month" type="button">本月</button><button class="chip" data-range="lastMonth" type="button">上月</button></div>
<div class="chips"><button class="btn" id="resetBtn" type="button">清空筛选</button><span class="result-text" id="resultText">正在读取数据...</span></div>
</div>
</div></section>

<section class="table-card">
<div class="table-top"><div><div class="table-title">任务明细</div><div class="hint">横向滚动可查看更多字段；表头固定方便对照。</div></div></div>
<div class="table-scroll">
<table><thead><tr><th>任务ID</th><th>任务名称</th><th>兼职</th><th>学科</th><th>年级</th><th>题量</th><th>任务状态</th><th>交付日期</th><th>质检审核完成日期</th><th>扣题</th><th>抽检备注</th><th>提成</th></tr></thead><tbody id="tbody"></tbody></table>
<div class="empty" id="emptyState" hidden><div class="empty-icon">🧐</div><strong>没有找到匹配任务</strong><div>换个关键词，或清空筛选试试。</div></div>
</div></section>
</main>
<button class="backtop" id="backTopBtn" type="button">↑</button><div class="toast" id="toast">已复制</div>

<script>
const $=id=>document.getElementById(id);
const fields=[["taskId","任务ID"],["taskName","任务名称"],["partTimer","兼职"],["subject","学科"],["grade","年级"],["quantity","题量"],["productionStatus","任务状态"],["dueDate","交付日期"],["qcReviewCompletedDate","质检审核完成日期"],["deductedQuestions","扣题"],["inspectionNote","抽检备注"],["commission","提成"]];
let rawData=[],current=[];
function valueOf(obj,keys){for(const k of keys){const v=obj?.[k];if(v!==undefined&&v!==null&&String(v).trim()!=="")return String(v).trim()}return""}
function parseDate(input){if(!input)return null;const t=String(input).trim();if(!t)return null;const n=t.replace(/\./g,"-").replace(/\//g,"-").replace(/[年月]/g,"-").replace(/日/g,"").split(" ")[0];const m=n.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(!m)return null;const y=+m[1],mo=+m[2],d=+m[3],date=new Date(y,mo-1,d);if(date.getFullYear()!==y||date.getMonth()!==mo-1||date.getDate()!==d)return null;return date}
function dateVal(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmtDate(v){const d=parseDate(v);return d?dateVal(d):(v||"")}
function normalizeItem(item){return{taskId:valueOf(item,["taskId","任务ID","任务id","ID","id"]),taskName:valueOf(item,["taskName","任务名称","任务名","名称"]),partTimer:valueOf(item,["partTimer","兼职","PPT兼职","ppt兼职","制作兼职","接单人"]),subject:valueOf(item,["subject","学科"]),grade:valueOf(item,["grade","年级"]),quantity:valueOf(item,["quantity","题量","数量"]),productionStatus:valueOf(item,["productionStatus","taskStatus","任务状态","制作状态","状态","分配状态"]),dueDate:fmtDate(valueOf(item,["dueDate","交付日期","预计交付日期"])),qcReviewCompletedDate:fmtDate(valueOf(item,["qcReviewCompletedDate","质检审核完成日期","qcCompletedDate","质检交付完成日期","质检完成日期","审核完成日期","质检日期"])),deductedQuestions:valueOf(item,["deductedQuestions","扣题","扣题数","扣除题数"]),inspectionNote:valueOf(item,["inspectionNote","抽检备注","质检备注","备注","note"]),commission:valueOf(item,["commission","提成","结算提成","金额","price","价格"])}}
function isDone(s){return /完成|已交付|通过|结算|审核完成/.test(s||"")}function isBad(s){return /异常|退回|驳回|失败|暂停|取消/.test(s||"")}function isDoing(s){return /进行|制作中|处理中|待质检|审核中|分配成功/.test(s||"")}function statusClass(s){if(!s)return"neutral";if(isBad(s))return"bad";if(isDone(s))return"ok";if(isDoing(s))return"doing";if(/待|未|排队/.test(s))return"wait";return"neutral"}
function td(text,cls=""){const c=document.createElement("td");if(cls)c.className=cls;c.textContent=text||"-";return c}
function statusTd(s){const c=document.createElement("td"),span=document.createElement("span");span.className=`pill ${statusClass(s)}`;span.textContent=s||"未填写";c.appendChild(span);return c}
function renderTable(data){const body=$("tbody");body.innerHTML="";$("emptyState").hidden=data.length!==0;const frag=document.createDocumentFragment();data.forEach(x=>{const tr=document.createElement("tr");tr.append(td(x.taskId,"task-id"),td(x.taskName,"task-name"),td(x.partTimer),td(x.subject),td(x.grade),td(x.quantity),statusTd(x.productionStatus),td(x.dueDate),td(x.qcReviewCompletedDate),td(x.deductedQuestions),td(x.inspectionNote,"note"),td(x.commission,"money"));frag.appendChild(tr)});body.appendChild(frag)}
function unique(key){return[...new Set(rawData.map(x=>x[key]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),"zh-CN"))}
function fillSelect(id,values,label){const s=$(id);s.innerHTML=`<option value="">${label}</option>`;values.forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o)})}
function initFilters(){fillSelect("partTimerSelect",unique("partTimer"),"全部兼职");fillSelect("statusSelect",unique("productionStatus"),"全部状态")}
function matchKeyword(x,k){if(!k)return true;return[x.taskId,x.taskName,x.partTimer,x.subject,x.grade,x.quantity,x.productionStatus,x.qcReviewCompletedDate,x.inspectionNote,x.commission].join(" ").toLowerCase().includes(k.toLowerCase())}
function inDateRange(x){const sv=$("startDateInput").value,ev=$("endDateInput").value;if(!sv&&!ev)return true;const d=parseDate(x.qcReviewCompletedDate);if(!d)return false;const s=sv?parseDate(sv):null,e=ev?parseDate(ev):null;if(s&&d<s)return false;if(e&&d>e)return false;return true}
function applyFilters(){const k=$("keywordInput").value.trim(),tid=$("taskIdInput").value.trim().toLowerCase(),pt=$("partTimerSelect").value,st=$("statusSelect").value;current=rawData.filter(x=>matchKeyword(x,k)&&(!tid||String(x.taskId).toLowerCase().includes(tid))&&(!pt||x.partTimer===pt)&&(!st||x.productionStatus===st)&&inDateRange(x));renderStats();renderTable(current);$("resultText").textContent=`共 ${rawData.length} 条任务，当前筛选 ${current.length} 条`}
function renderStats(){$("totalCount").textContent=rawData.length;$("doneCount").textContent=rawData.filter(x=>isDone(x.productionStatus)).length;$("pendingCount").textContent=rawData.filter(x=>!isDone(x.productionStatus)).length;$("filteredCount").textContent=current.length}
function resetFilters(){$("keywordInput").value="";$("taskIdInput").value="";$("partTimerSelect").value="";$("statusSelect").value="";$("startDateInput").value="";$("endDateInput").value="";setActiveChip("all");applyFilters();toast("筛选已清空")}
function setActiveChip(r){document.querySelectorAll(".chip[data-range]").forEach(b=>b.classList.toggle("active",b.dataset.range===r))}
function setQuickRange(r){const today=new Date(),start=new Date(today),end=new Date(today);if(r==="all"){$("startDateInput").value="";$("endDateInput").value=""}if(r==="today"){$("startDateInput").value=dateVal(today);$("endDateInput").value=dateVal(today)}if(r==="7days"){start.setDate(today.getDate()-6);$("startDateInput").value=dateVal(start);$("endDateInput").value=dateVal(end)}if(r==="month"){const first=new Date(today.getFullYear(),today.getMonth(),1);$("startDateInput").value=dateVal(first);$("endDateInput").value=dateVal(end)}if(r==="lastMonth"){const first=new Date(today.getFullYear(),today.getMonth()-1,1),last=new Date(today.getFullYear(),today.getMonth(),0);$("startDateInput").value=dateVal(first);$("endDateInput").value=dateVal(last)}setActiveChip(r);applyFilters()}
function escapeCSV(v){return `"${String(v??"").replaceAll('"','""')}"`}
function downloadCSV(){const headers=fields.map(f=>f[1]),rows=current.map(x=>fields.map(f=>x[f[0]]||""));const csv=[headers,...rows].map(r=>r.map(escapeCSV).join(",")).join("\n");const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`兼职任务查询结果_${dateVal(new Date())}.csv`;a.click();URL.revokeObjectURL(url);toast(`已导出 ${current.length} 条`)}
async function copySummary(){const text=["兼职任务查询摘要",`总任务数：${rawData.length}`,`当前筛选：${current.length}`,`兼职：${$("partTimerSelect").value||"全部"}`,`任务状态：${$("statusSelect").value||"全部"}`,`任务ID：${$("taskIdInput").value||"未指定"}`,`关键词：${$("keywordInput").value||"未指定"}`,`质检审核完成日期：${$("startDateInput").value||"不限"} 至 ${$("endDateInput").value||"不限"}`].join("\n");try{await navigator.clipboard.writeText(text);toast("筛选摘要已复制")}catch(e){toast("复制失败，可导出 CSV")}}
function toast(msg){const el=$("toast");el.textContent=msg;el.classList.add("show");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove("show"),1800)}
async function loadData(){try{const res=await fetch("data.json",{cache:"no-store"});if(!res.ok)throw new Error("data.json 读取失败");const json=await res.json();const list=Array.isArray(json)?json:(json.data||json.rows||[]);rawData=list.map(normalizeItem);current=[...rawData];initFilters();applyFilters();toast("数据已更新")}catch(e){console.error(e);rawData=[];current=[];renderStats();renderTable([]);$("resultText").textContent="未读取到 data.json，请检查文件是否在同一目录";$("emptyState").hidden=false}}
function bindEvents(){["keywordInput","taskIdInput","partTimerSelect","statusSelect","startDateInput","endDateInput"].forEach(id=>$(id).addEventListener("input",applyFilters));$("resetBtn").addEventListener("click",resetFilters);$("exportBtn").addEventListener("click",downloadCSV);$("copySummaryBtn").addEventListener("click",copySummary);document.querySelectorAll(".chip[data-range]").forEach(btn=>btn.addEventListener("click",()=>setQuickRange(btn.dataset.range)));$("backTopBtn").addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));window.addEventListener("scroll",()=>$("backTopBtn").classList.toggle("show",window.scrollY>420))}
bindEvents();loadData();
</script>
</body>
</html>
